<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Clicker | Milestone Rewards</title>
    <link rel="stylesheet" href="game-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-theme">

    <a href="https://твоє-ім'я.github.io/portfolio/" class="back-btn">← Back to Portfolio</a>
    
    <div class="controls">
        <button id="theme-toggle"><i class="fas fa-moon"></i></button>
        <button id="reset-game" class="danger-btn">Reset to 0</button>
    </div>

    <div class="container">
        <div class="stat-box">
            <h1 id="counter">0</h1>
            <p id="rank">Beginner</p>
        </div>

        <div class="target-area">
            <button id="clickBtn" class="main-circle">CLICK</button>
        </div>

        <div class="rewards-track">
            <p>Next Reward at: <span id="nextGoal">50</span></p>
            <div class="progress-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>

        <div id="giftBox" class="gift-announcement">
            <i class="fas fa-gift"></i>
            <p id="giftMessage">Keep clicking!</p>
        </div>
    </div>

    <script src="game-script.js"></script>
</body>
</html>
